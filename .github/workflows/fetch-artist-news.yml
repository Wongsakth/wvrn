name: Fetch Artist News

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install xml2js

      - name: Fetch and save artist news
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cat << 'SCRIPT' > run.js
          const https = require('https')
          const { parseStringPromise } = require('xml2js')

          const SUPABASE_URL = process.env.SUPABASE_URL
          const SUPABASE_KEY = process.env.SUPABASE_SERVICE_KEY

          async function sbFetch(path, method = 'GET', body = null) {
            return new Promise((resolve, reject) => {
              const url = new URL(SUPABASE_URL + path)
              const opts = {
                hostname: url.hostname,
                path: url.pathname + url.search,
                method,
                headers: {
                  'apikey': SUPABASE_KEY,
                  'Authorization': `Bearer ${SUPABASE_KEY}`,
                  'Content-Type': 'application/json',
                  'Accept': 'application/json',
                }
              }
              const req = https.request(opts, res => {
                let d = ''
                res.on('data', c => d += c)
                res.on('end', () => {
                  console.log('RAW RESPONSE:', d.slice(0, 200))
                  try {
                    const parsed = JSON.parse(d || '[]')
                    console.log('PARSED TYPE:', typeof parsed, Array.isArray(parsed))
                    resolve(Array.isArray(parsed) ? parsed : (parsed?.data || []))
                  } catch(e) {
                    console.log('PARSE ERROR:', e.message)
                    resolve([])
                  }
                })
              })
              req.on('error', reject)
              if (body) req.write(JSON.stringify(body))
              req.end()
            })
          }

          async function main() {
            console.log('SUPABASE_URL:', SUPABASE_URL ? 'set' : 'NOT SET')
            console.log('SUPABASE_KEY:', SUPABASE_KEY ? 'set' : 'NOT SET')
            console.log('Loading artists...')
            const artists = await sbFetch('/rest/v1/artists?select=id,name,name_en&is=deleted_at,null&limit=5&order=name')
            console.log(`Total: ${artists.length} artists`)
            console.log('First artist:', JSON.stringify(artists[0]))
          }

          main().catch(console.error)
          SCRIPT
          node run.js
